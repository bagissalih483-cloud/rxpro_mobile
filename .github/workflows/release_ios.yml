name: iOS Release Build Gate

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "Version name"
        required: true
        default: "1.0.0"
        type: string
      build_number:
        description: "Build number. Use auto to use the GitHub run number."
        required: true
        default: "auto"
        type: string
      app_check_debug:
        description: "Use Firebase App Check debug provider for simulator/CI validation."
        required: true
        default: true
        type: boolean
      run_tests:
        description: "Run Flutter tests before building."
        required: true
        default: true
        type: boolean

jobs:
  ios-build-gate:
    name: Build iOS Release Without Codesign
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        if: ${{ inputs.run_tests }}
        run: flutter test --dart-define=RXPRO_SAFE_BOOT=true

      - name: iOS static release gate
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tools/release_gate_check.ps1 -SkipAndroid -SkipIosSigning

      - name: Build iOS release without codesign
        shell: pwsh
        run: |
          $logDir = Join-Path $env:GITHUB_WORKSPACE "build/ci_logs"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          $flutterLogPath = Join-Path $logDir "flutter-ios-build.log"

          $buildName = "${{ inputs.build_name }}"
          $buildNumber = "${{ inputs.build_number }}"
          if ([string]::IsNullOrWhiteSpace($buildNumber) -or $buildNumber -eq "auto") {
            $buildNumber = "${{ github.run_number }}"
          }

          $buildArgs = @(
            "build",
            "ios",
            "--release",
            "--no-codesign",
            "--build-name",
            $buildName,
            "--build-number",
            $buildNumber,
            "--dart-define=RXPRO_APP_CHECK_DEBUG=${{ inputs.app_check_debug }}"
          )

          flutter @buildArgs 2>&1 | Tee-Object -FilePath $flutterLogPath
          $buildExitCode = $LASTEXITCODE

          $derivedDataLogs = Join-Path $env:HOME "Library/Developer/Xcode/DerivedData"
          if (Test-Path $derivedDataLogs) {
            $xcodeLogDir = Join-Path $logDir "xcode"
            New-Item -ItemType Directory -Force -Path $xcodeLogDir | Out-Null
            Get-ChildItem -Path $derivedDataLogs -Recurse -Include "*.xcactivitylog", "*.xcresult" -ErrorAction SilentlyContinue |
              Copy-Item -Destination $xcodeLogDir -Force -ErrorAction SilentlyContinue
          }

          if ($buildExitCode -ne 0) {
            exit $buildExitCode
          }

      - name: Upload iOS diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rxpro-ios-diagnostic-logs
          path: build/ci_logs/**
          if-no-files-found: ignore

      - name: Upload unsigned iOS app bundle
        uses: actions/upload-artifact@v4
        with:
          name: rxpro-ios-release-unsigned-app
          path: build/ios/iphoneos/Runner.app
          if-no-files-found: error
