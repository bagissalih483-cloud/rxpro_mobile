name: iOS Release Build Gate

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "Version name"
        required: true
        default: "1.0.0"
        type: string
      build_number:
        description: "Build number. Use auto to use the GitHub run number."
        required: true
        default: "auto"
        type: string
      app_check_debug:
        description: "Use Firebase App Check debug provider for simulator/CI validation."
        required: true
        default: true
        type: boolean
      run_tests:
        description: "Run Flutter tests before building."
        required: true
        default: true
        type: boolean

jobs:
  ios-build-gate:
    name: Build iOS Release Without Codesign
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        if: ${{ inputs.run_tests }}
        run: flutter test --dart-define=RXPRO_SAFE_BOOT=true

      - name: iOS static release gate
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File tools/release_gate_check.ps1 -SkipAndroid -SkipIosSigning

      - name: Build iOS release without codesign
        shell: pwsh
        run: |
          $buildName = "${{ inputs.build_name }}"
          $buildNumber = "${{ inputs.build_number }}"
          if ([string]::IsNullOrWhiteSpace($buildNumber) -or $buildNumber -eq "auto") {
            $buildNumber = "${{ github.run_number }}"
          }

          $buildArgs = @(
            "build",
            "ios",
            "--release",
            "--no-codesign",
            "--build-name",
            $buildName,
            "--build-number",
            $buildNumber,
            "--dart-define=RXPRO_APP_CHECK_DEBUG=${{ inputs.app_check_debug }}"
          )

          flutter @buildArgs

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload unsigned iOS app bundle
        uses: actions/upload-artifact@v4
        with:
          name: rxpro-ios-release-unsigned-app
          path: build/ios/iphoneos/Runner.app
          if-no-files-found: error
