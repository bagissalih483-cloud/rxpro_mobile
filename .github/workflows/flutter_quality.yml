name: Flutter Quality Gate

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  quality:
    name: Analyze, Test, Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Cloud Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Run RxPro quality gate
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File tools\ci_quality_check.ps1
